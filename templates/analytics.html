{% extends "base.html" %}

{% block title %}Analytics — Spendly{% endblock %}

{% block content %}
<section class="analytics-section">
    <div class="analytics-card">

        <div class="analytics-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24"
                 fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"/>
                <polyline points="12 6 12 12 16 14"/>
            </svg>
        </div>

        <span class="analytics-badge">Coming Soon</span>

        <h1 class="analytics-title">Advanced Analytics</h1>

        <p class="analytics-subtitle">
            We're working on powerful insights and visualizations
            to help you understand your spending patterns better.
        </p>

        <div class="analytics-dots">
            <span></span>
            <span></span>
            <span></span>
        </div>

        <p class="analytics-caption">We're crafting something special</p>

    </div>
</section>
{% endblock %}
